<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="CineVerso Logo">
        </div>
        <input type="text" id="searchInput" placeholder="Pesquisar filmes...">
    </header>

    <section class="hero" id="hero">
        <div class="hero-content">
            <h1>Discover Movies</h1>
            <p>Explore os filmes e séries mais bombados 🍿</p>
            <button id="heroTrailerBtn">▶ Assista ao Trailer</button>
        </div>
    </section>

    <section class="section">
        <h2>🔥Em alta</h2>
        <div class="movies-grid" id="moviesGrid"></div>
    </section>

    <section class="section">
        <h2>⭐ Meus Favoritos</h2>
        <div class="movies-grid" id="favoritesGrid"></div>
    </section>

    <!-- MODAL DO TRAILER -->
    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close-btn">&times;</span>
            <iframe id="trailerFrame" width="100%" height="450" allow="autoplay; encrypted-media"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
